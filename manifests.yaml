apiVersion: v1
kind: ConfigMap
metadata:
  name: url-shortener-config
  namespace: default
data:
  APP_ENV: "production"
  PORT: "8080"
  # Add other variables here (e.g., your DB string if pointing to an external DB)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener-deployment
  namespace: default
  labels:
    app: url-shortener
spec:
  replicas: 1 # Keeping it to 1 pod to stay well within resource limits of a B2s node
  selector:
    matchLabels:
      app: url-shortener
  template:
    metadata:
      labels:
        app: url-shortener
    spec:
      containers:
      - name: shortener-app
        # Make sure this points to your specific built image
        image: yourdockerhubusername/url-shortener:latest 
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: url-shortener-config
        resources:
          limits:
            cpu: "250m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: url-shortener-service
  namespace: default
spec:
  type: LoadBalancer # AKS automatically binds an external Azure Public IP here
  ports:
  - port: 80        # The public port you'll visit in your browser
    targetPort: 8080 # The internal container port your app listens on
    protocol: TCP
  selector:
    app: url-shortener